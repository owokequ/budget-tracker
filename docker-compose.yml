version: '3.8'

services:
  postgres:
    image: postgres:17
    container_name: my-project-db
    environment:
      POSTGRES_USER: projectuser
      POSTGRES_PASSWORD: projectpass
      POSTGRES_DB: projectdb
    ports:
      - "5432:5432"  
    volumes:
      - project-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  project-data: